name = "mailfree4alan"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "395eed74-5d58-4ad7-8939-af1137845bce" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="alan"
ADMIN_PASSWORD="Goodluck@1234."
GUEST_PASSWORD="Goodluck@1234."
JWT_TOKEN="7k9s2pFm5xR8bQ1vG4tZ7dN2hS"
JWT_TOKENGUEST_PASSWORD="9dS3jK7pR2mF5bV8gQ1zT4nH6"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="mail.alanm.asia"
RESEND_API_KEY="2xP5sK8mR7bF3vQ1gZ9tD4nH2"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true